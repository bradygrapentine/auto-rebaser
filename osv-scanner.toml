# OSV Scanner allowlist — consumed by the `osv` job in .github/workflows/security.yml
# via `--config=osv-scanner.toml`.
#
# No active suppressions. The three dev-only advisories that previously lived
# here (vite GHSA-4w7w-66w2-5vf9, esbuild GHSA-67mh-4wv8-2f99, ws
# GHSA-58qx-3vcg-4xpx) were the forcing function for OPS-2 and are now
# genuinely fixed — not suppressed — by OPS-2 stage (c) (PR for vite 5 -> 6.4.2,
# which pulls esbuild >= 0.25 + rollup >= 4.59, plus ws 8.20.0 -> 8.21.0 under
# jsdom). OSV is now GREEN on main with zero exceptions and can be promoted to
# OPS-1's branch-protection required-checks set (a separate ruleset step).
#
# The file is intentionally kept (with the `--config` flag) so any future
# time-boxed exception has a home and a documented forcing-function pattern:
# add an ignore block (per the osv-scanner config docs) with an ignoreUntil +
# reason, and keep OSV off the required-checks list while any expiry exists so a
# lapse cannot block merges.
