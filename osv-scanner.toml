# OSV Scanner allowlist — consumed by the `osv` job in .github/workflows/security.yml
# via `--config=osv-scanner.toml`.
#
# These three advisories are all in DEV-ONLY dependencies (vite and its
# transitive esbuild/ws). They are build/test tooling and are never bundled
# into the shipped MV3 extension — the same reason the `audit` job runs
# `npm audit --audit-level=critical --omit=dev`. None are Critical/High.
#
# `ignoreUntil` is a forcing function: the real fix is OPS-2 (the staged
# vite 5 -> 6 + vitest 1 -> 3 upgrade, docs/superpowers/BACKLOG.md §1), which
# pulls fixed esbuild/ws. When the date passes the gate fails again until OPS-2
# lands or the exception is consciously renewed. New/other vulns are NOT
# suppressed. NOTE: OSV must stay OFF the branch-protection required-checks
# list while this expiry exists, so a lapse cannot block merges.

