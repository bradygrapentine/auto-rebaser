<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="auto-rebaser">
  <!-- Green rounded background -->
  <rect width="128" height="128" rx="22" ry="22" fill="#2da44e"/>

  <!-- White compare/rebase glyph: two ring nodes (top-left, bottom-right) connected by two
       counter-rotating arrows. -->
  <g fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-left ring → down → right (arrow pointing right) -->
    <path d="M 30 48 L 30 84 Q 30 96 42 96 L 58 96"/>
    <polyline points="48 84 60 96 48 108"/>

    <!-- Bottom-right ring → up → left (arrow pointing left) -->
    <path d="M 98 80 L 98 44 Q 98 32 86 32 L 70 32"/>
    <polyline points="80 20 68 32 80 44"/>
  </g>

  <!-- Hollow ring nodes -->
  <g>
    <circle cx="30" cy="30" r="18" fill="#ffffff"/>
    <circle cx="30" cy="30" r="7"  fill="#2da44e"/>
    <circle cx="98" cy="98" r="18" fill="#ffffff"/>
    <circle cx="98" cy="98" r="7"  fill="#2da44e"/>
  </g>
</svg>
