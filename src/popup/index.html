<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Rebaser</title>
    <style>
      * { box-sizing: border-box; }
      /* Popup window auto-sizes to body content; give body+root a min-height
         so the .popup-root flex column doesn't collapse to 0 when its
         children use `min-height: 0` for scroll. */
      html, body { margin: 0; min-height: 200px; font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 200px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
