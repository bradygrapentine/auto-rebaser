name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    # Fail fast instead of inheriting the 360-minute default. A hung or
    # runner-contended job dies predictably at the cap rather than sitting
    # red for hours. Full unit+typecheck+build runs in a couple minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    # Pinned to GitHub-hosted ubuntu (test + security stay self-hosted). The
    # MV3 popup e2e deadlocks on the self-hosted Mac under load: toggling a
    # setting drives a POLL_NOW loop (empty known-repos re-polls on every
    # storage change), so the page never goes network-idle and Playwright's
    # post-click "waiting for scheduled navigations" hangs past the timeout.
    # This flow has always run green on ubuntu; raising the timeout (#204) and
    # dropping video (#209) only changed the symptom. See REVIEWER/OPS backlog
    # for the underlying POLL_NOW-storm investigation.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test
      # always() (not failure()) so the trace still uploads when the job is
      # CANCELLED by the timeout-minutes cap — failure() is skipped on
      # cancellation, which is exactly when we were left blind. trace/video
      # are retain-on-failure, so test-results/ is empty on green and
      # if-no-files-found: ignore keeps that case quiet.
      - if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
