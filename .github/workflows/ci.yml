name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Runs on GitHub-hosted ubuntu (Security stays self-hosted). Moved off the
    # self-hosted Mac after actions/setup-node deadlocked under concurrent
    # multi-project host load — zero output for ~20 min until the timeout cap
    # killed it (OPS-3; the #211 merge commit 70999b7, run 26651477975). `test`
    # is an OPS-1 required check, so a host wedge blocks every PR merge; ubuntu
    # removes the contended host from the critical path. Mirrors the e2e fix
    # (#209) — the identical setup-node step runs green on ubuntu for e2e.
    runs-on: ubuntu-latest
    # Fail fast instead of inheriting the 360-minute default; the suite runs in
    # a couple minutes, so a stuck job dies predictably at the cap.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    # Pinned to GitHub-hosted ubuntu (Security stays self-hosted; `test` moved
    # to ubuntu in OPS-3). The
    # MV3 popup e2e deadlocks on the self-hosted Mac under load: toggling a
    # setting drives a POLL_NOW loop (empty known-repos re-polls on every
    # storage change), so the page never goes network-idle and Playwright's
    # post-click "waiting for scheduled navigations" hangs past the timeout.
    # This flow has always run green on ubuntu; raising the timeout (#204) and
    # dropping video (#209) only changed the symptom. See REVIEWER/OPS backlog
    # for the underlying POLL_NOW-storm investigation.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test
      # always() (not failure()) so the trace still uploads when the job is
      # CANCELLED by the timeout-minutes cap — failure() is skipped on
      # cancellation, which is exactly when we were left blind. trace/video
      # are retain-on-failure, so test-results/ is empty on green and
      # if-no-files-found: ignore keeps that case quiet.
      - if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
