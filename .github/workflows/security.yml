name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: npm audit (critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical --omit=dev
        # --omit=dev: vitest/vite are dev-only deps with known critical advisories
        # (GHSA-9crc-q9x8-hgqq — RCE only when API server is listening during dev).
        # They are never bundled into the production extension. Tighten once
        # vitest >=1.6.1 is pinned in package.json.

  osv:
    name: OSV Scanner
    runs-on: ubuntu-latest
    # continue-on-error: OSV scans package-lock.json including dev deps; the only critical
    # finding today is vitest (GHSA-9crc-q9x8-hgqq) which is dev-only and never bundled.
    # `npm audit --omit=dev` (above) already gates production deps to zero critical.
    # Tighten once vitest >=1.6.1 is pinned (and consider adding osv-scanner.toml to
    # filter the lockfile's dev-dep tree).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency review requires GitHub's Dependency graph feature, which is not
  # currently enabled on this repo. Enable at
  # https://github.com/bradygrapentine/auto-rebaser/settings/security_analysis
  # then flip `if: false` to `if: github.event_name == 'pull_request'`.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
