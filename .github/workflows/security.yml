name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: npm audit (critical)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical --omit=dev
        # --omit=dev: vitest/vite are dev-only and never bundled into the production extension.

  osv:
    name: OSV Scanner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      # Container-based osv-scanner-action only supports Linux runners.
      # Self-hosted macOS path: install via brew + run directly.
      - name: Install osv-scanner
        run: |
          if ! command -v osv-scanner >/dev/null 2>&1; then
            brew install osv-scanner
          fi
      # --config: dev-only advisories are time-boxed in osv-scanner.toml (OPS-2).
      - run: osv-scanner scan source --recursive --config=osv-scanner.toml ./

  gitleaks:
    name: Gitleaks secret scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
      # gitleaks-action downloads to a fixed temp path that collides across
      # runs on the persistent runner. Install via brew + invoke directly.
      - name: Install gitleaks
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            brew install gitleaks
          fi
      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --source .

  dependency-review:
    name: Dependency review
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
